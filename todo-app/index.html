<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 My To-Do List</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <main>
            <!-- Input Section -->
            <div class="input-section">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="taskInput" 
                        class="task-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">Add Task</button>
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
            </div>

            <!-- Stats Section -->
            <div class="stats-section">
                <div class="stat">
                    <span class="stat-label">Total Tasks</span>
                    <span class="stat-value" id="totalTasks">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Completed</span>
                    <span class="stat-value" id="completedTasks">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Pending</span>
                    <span class="stat-value" id="pendingTasks">0</span>
                </div>
            </div>

            <!-- Tasks List Section -->
            <div class="tasks-section">
                <ul id="taskList" class="task-list">
                    <!-- Tasks will be dynamically added here -->
                </ul>
                <div id="emptyState" class="empty-state">
                    <p>✨ No tasks yet. Add one to get started!</p>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button id="clearCompletedBtn" class="action-btn clear-btn">Clear Completed</button>
                <button id="clearAllBtn" class="action-btn delete-btn">Clear All</button>
                <button id="exportBtn" class="action-btn export-btn">Export</button>
            </div>
        </main>

        <!-- Priority Legend -->
        <div class="priority-legend">
            <h3>Priority Levels</h3>
            <div class="legend-items">
                <span class="legend-item"><span class="priority-badge high"></span> High</span>
                <span class="legend-item"><span class="priority-badge medium"></span> Medium</span>
                <span class="legend-item"><span class="priority-badge low"></span> Low</span>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Edit Task</h2>
            <div class="modal-body">
                <input 
                    type="text" 
                    id="editTaskInput" 
                    class="modal-input" 
                    placeholder="Task description"
                >
                <select id="editPrioritySelect" class="modal-select">
                    <option value="low">Low Priority</option>
                    <option value="medium" selected>Medium Priority</option>
                    <option value="high">High Priority</option>
                </select>
                <textarea 
                    id="editDescriptionInput" 
                    class="modal-textarea" 
                    placeholder="Add a description (optional)"
                    rows="3"
                ></textarea>
            </div>
            <div class="modal-footer">
                <button id="cancelEditBtn" class="modal-btn cancel-btn">Cancel</button>
                <button id="saveEditBtn" class="modal-btn save-btn">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content small">
            <h2 id="confirmTitle">Confirm Action</h2>
            <p id="confirmMessage">Are you sure?</p>
            <div class="modal-footer">
                <button id="confirmCancelBtn" class="modal-btn cancel-btn">Cancel</button>
                <button id="confirmOkBtn" class="modal-btn save-btn">Confirm</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
